<script>
// а¶Єа¶Ња¶∞аІНа¶Ъ а¶Єа¶Ња¶ЬаІЗа¶ґа¶® а¶≤а¶Ьа¶ња¶Х
const searchInputBox = document.getElementById("search");
const suggestionContainer = document.getElementById("search-suggestions");

searchInputBox.addEventListener("input", function() {
  const query = this.value.toLowerCase().trim();
  if (query.length < 1) {
    suggestionContainer.style.display = "none";
    return;
  }

  const matches = videosData.filter(v => 
    v.title.toLowerCase().includes(query) || 
    v.keywords.toLowerCase().includes(query)
  ).slice(0, 6);

  if (matches.length > 0) {
    suggestionContainer.innerHTML = matches.map(m => `
      <div class="suggestion-item" onclick="applySuggestion('${m.title.replace(/'/g, "\\'")}')">
        ${m.title}
      </div>
    `).join('');
    suggestionContainer.style.display = "block";
  } else {
    suggestionContainer.style.display = "none";
  }
});

function applySuggestion(text) {
  searchInputBox.value = text;
  suggestionContainer.style.display = "none";
  handleSearch(null, false); 
}

document.addEventListener("click", function(e) {
  if (e.target !== searchInputBox) {
    suggestionContainer.style.display = "none";
  }
});
</script>

function smartNormalize(text) {
  if(!text) return "";
  let s = String(text).toLowerCase();
  s = s.replace(/</g, "&lt;").replace(/>/g, "&gt;");
  
  // в≠Р а¶Па¶З а¶ЃаІНа¶ѓа¶Ња¶™а¶Яа¶њ а¶Па¶Ца¶® а¶Йа¶®аІНа¶®а¶§ а¶Ѓа¶Ња¶≤аІНа¶Яа¶њ-а¶≤аІНа¶ѓа¶Ња¶ЩаІНа¶ЧаІБа¶ѓа¶ЉаІЗа¶Ь а¶Єа¶Ња¶™аІЛа¶∞аІНа¶ЯаІЗа¶∞ а¶Ьа¶®аІНа¶ѓ а¶Ђа¶ња¶ХаІНа¶Єа¶°
  phoneticMap.forEach(m=>{ s = s.replace(m.from, m.to); });
  
  const fix = {"pasword":"password", "paswrd":"password", "gogle":"google", "fcebook":"facebook", "yutube":"youtube", "vidio":"video", "uplaod":"upload"};
  for(let bad in fix){ s = s.replace(new RegExp(bad,"g"), fix[bad]); }
  // non-alphanumeric cleanup
  s = s.replace(/[вАВ-вБѓвЄА-вєњ!"#$%&'()*+,-./:;<=>?@[\\]^_`{|}~а•§ўђЎМа•§]/g, " ");
  s = s.replace(/\s+/g," ").trim();
  return s;
}

/* ============== highlight helper (unchanged) ============== */
function escapeRegExp(string) {
  return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}
function highlightMatch(text, query) {
  if(!query || !text) return text || "";
  // split query words, highlight each
  const parts = query.trim().split(/\s+/).filter(Boolean).map(q => escapeRegExp(q));
  if(parts.length === 0) return text;
  const re = new RegExp("(" + parts.join("|") + ")", "gi");
  return String(text).replace(re, '<span class="match">$1</span>');
}

    return videosData;
  }
  const resultsByNorm = fuse.search(q);
  const resultsByQuery = fuse.search(query);
  let uniqueResultsMap = new Map();
  resultsByNorm.forEach(r => {
      if(!uniqueResultsMap.has(r.item.youtubeId) || r.score < uniqueResultsMap.get(r.item.youtubeId).score) { 
          uniqueResultsMap.set(r.item.youtubeId, r);
      }
  });
  resultsByQuery.forEach(r => {
      if(!uniqueResultsMap.has(r.item.youtubeId) || r.score < uniqueResultsMap.get(r.item.youtubeId).score) { 
          uniqueResultsMap.set(r.item.youtubeId, r);
      }
  });
  const finalResults = Array.from(uniqueResultsMap.values())
      .sort((a, b) => a.score - b.score)
      .map(r => r.item);
  // If no results, still try fuzzy includes (very small matches) вАФ include any whose normalized keywords include query tokens
  if(finalResults.length === 0) {
    const tokens = q.split(" ").filter(Boolean);
    normalizedVideosData.forEach(v => {
      for(const t of tokens) {
        if(v.keywords_normalized.includes(t) || smartNormalize(v.title).includes(t) || smartNormalize(v.desc).includes(t)) {
          if(!finalResults.includes(v)) finalResults.push(v);
          break;
        }
      }
    });
  }
  return finalResults;
}

// в≠Р а¶®а¶§аІБа¶® а¶ХаІЛа¶° а¶ђаІНа¶≤а¶Х: а¶Єа¶Ња¶∞аІНа¶Ъ а¶єа¶ња¶ЄаІНа¶ЯаІЛа¶∞а¶њ а¶Па¶ђа¶В а¶Уа¶ѓа¶Ља¶Ња¶Ъ а¶єа¶ња¶ЄаІНа¶ЯаІЛа¶∞а¶њ а¶Йа¶≠а¶ѓа¶Ља¶З а¶єаІНа¶ѓа¶Ња¶®аІНа¶°аІЗа¶≤ а¶Ха¶∞а¶ђаІЗ в≠Р
// ----------------------------------------------------------
const urlSearchQuery = getQueryParam('search'); // URL а¶•аІЗа¶ХаІЗ 'search' а¶™аІНа¶ѓа¶Ња¶∞а¶Ња¶Ѓа¶ња¶Яа¶Ња¶∞а¶Яа¶њ а¶®а¶ња¶®

if (urlSearchQuery) {
  // 1. а¶ѓа¶¶а¶њ а¶Єа¶Ња¶∞аІНа¶Ъ а¶єа¶ња¶ЄаІНа¶ЯаІЛа¶∞а¶њ а¶•аІЗа¶ХаІЗ а¶Жа¶Єа¶Њ а¶ХаІЛа¶®аІЛ а¶ХаІЛа¶ѓа¶ЉаІЗа¶∞а¶њ а¶™а¶Ња¶УаІЯа¶Њ а¶ѓа¶ЊаІЯ
  const searchInput = document.getElementById('search');
  
  // а¶За¶®а¶™аІБа¶Я а¶ђа¶ХаІНа¶ЄаІЗ а¶ХаІЛа¶ѓа¶ЉаІЗа¶∞а¶ња¶Яа¶њ а¶ЄаІЗа¶Я а¶Ха¶∞аІБа¶®
  if (searchInput) {
    searchInput.value = urlSearchQuery;
  }

  // 2. а¶ЄаІНа¶ђа¶ѓа¶Ља¶Ва¶ХаІНа¶∞а¶ња¶ѓа¶Ља¶≠а¶Ња¶ђаІЗ а¶Єа¶Ња¶∞аІНа¶Ъ а¶Ђа¶Ња¶Ва¶ґа¶®а¶Яа¶њ а¶Ха¶≤ а¶Ха¶∞аІБа¶®
  setTimeout(() => {
    handleSearch(null, false); 
  }, 100); 

  // 3. URL а¶™а¶∞а¶ња¶ЈаІНа¶Ха¶Ња¶∞ а¶∞а¶Ња¶Ца¶Ња¶∞ а¶Ьа¶®аІНа¶ѓ ?search= а¶™аІНа¶ѓа¶Ња¶∞а¶Ња¶Ѓа¶ња¶Яа¶Ња¶∞а¶Яа¶њ а¶ЃаІБа¶ЫаІЗ а¶¶а¶ња¶® (а¶Ра¶ЪаІНа¶Ыа¶ња¶Х)
  if (window.history.replaceState) {
    const cleanUrl = window.location.origin + window.location.pathname;
    window.history.replaceState({path:cleanUrl},'',cleanUrl);
  }
} 





// ----------------------------------------------------------
// в≠Р а¶Уа¶ѓа¶Ља¶Ња¶Ъ а¶єа¶ња¶ЄаІНа¶ЯаІЛа¶∞а¶њ (а¶≠а¶ња¶°а¶ња¶У а¶Жа¶За¶°а¶њ: ?v=) а¶єаІНа¶ѓа¶Ња¶®аІНа¶°аІЗа¶≤ а¶Ха¶∞а¶Ња¶∞ а¶Ьа¶®аІНа¶ѓ а¶Єа¶Ва¶ґаІЛа¶Іа¶ња¶§ а¶≤а¶Ьа¶ња¶Х в≠Р
// ----------------------------------------------------------
else {
  const videoId = getQueryParam('v'); // URL а¶•аІЗа¶ХаІЗ 'v' (а¶≠а¶ња¶°а¶ња¶У а¶Жа¶За¶°а¶њ) а¶™аІНа¶ѓа¶Ња¶∞а¶Ња¶Ѓа¶ња¶Яа¶Ња¶∞а¶Яа¶њ а¶®а¶ња¶®

  if (videoId) {
    // 1. а¶≠а¶ња¶°а¶ња¶У а¶Жа¶За¶°а¶њ а¶¶а¶њаІЯаІЗ а¶≠а¶ња¶°а¶ња¶Уа¶∞ а¶°аІЗа¶Яа¶Њ а¶ЦаІБа¶Ба¶ЬаІБа¶®
    const videoData = videosData.find(v => v.youtubeId === videoId);

    if(videoData) {
      // 2. а¶≠а¶ња¶°а¶ња¶Уа¶Яа¶њ а¶ЦаІБа¶Ба¶ЬаІЗ а¶™аІЗа¶≤аІЗ, а¶Єа¶∞а¶Ња¶Єа¶∞а¶њ openVideo а¶Ђа¶Ња¶Ва¶ґа¶®а¶Яа¶њ а¶Ха¶≤ а¶Ха¶∞аІБа¶®
      // а¶Па¶Яа¶њ а¶Жа¶™а¶®а¶Ња¶∞ а¶§аІИа¶∞а¶њ Fullscreen Overlay а¶™аІНа¶≤аІЗа¶ѓа¶Ља¶Ња¶∞аІЗ а¶≠а¶ња¶°а¶ња¶Уа¶Яа¶њ а¶ЦаІБа¶≤а¶ђаІЗ
      openVideo(videoId, videoData.title);

      // 3. URL а¶™а¶∞а¶ња¶ЈаІНа¶Ха¶Ња¶∞ а¶∞а¶Ња¶Ца¶Њ (а¶Ра¶ЪаІНа¶Ыа¶ња¶Х)
      if (window.history.replaceState) {
        const cleanUrl = window.location.origin + window.location.pathname;
        window.history.replaceState({path:cleanUrl},'',cleanUrl);
      }
    }
  }
}




function updateVideoSchema(v) {
  let schemaId = "dynamic-video-schema";
  let oldSchema = document.getElementById(schemaId);
  if (oldSchema) oldSchema.remove();

  const schema = {
    "@context": "https://schema.org",
    "@type": "VideoObject",
    "name": v.title,
            // а¶Жа¶™а¶®а¶Ња¶∞ а¶ђа¶∞аІНа¶§а¶Ѓа¶Ња¶® а¶ЄаІНа¶Ха¶ња¶Ѓа¶Њ а¶ХаІЛа¶°аІЗа¶∞ а¶≠аІЗа¶§а¶∞аІЗ а¶ґаІБа¶ІаІБ а¶Па¶З а¶≤а¶Ња¶За¶®а¶Яа¶њ а¶ѓаІЛа¶Ч а¶Ха¶∞аІБа¶®
"keywords": v.keywords, 
    "description": v.desc,
    "thumbnailUrl": `https://img.youtube.com/vi/${v.youtubeId}/maxresdefault.jpg`,
    "uploadDate": "2024-01-01T08:00:00+08:00", // а¶Жа¶™а¶®а¶Ња¶∞ а¶™а¶Ыа¶®аІНа¶¶а¶Ѓа¶§аІЛ а¶°аІЗа¶Я
    "embedUrl": `https://www.youtube.com/embed/${v.youtubeId}`
  };

  const script = document.createElement('script');
  script.id = schemaId;
  script.type = 'application/ld+json';
  script.text = JSON.stringify(schema);
  document.head.appendChild(script);
}
