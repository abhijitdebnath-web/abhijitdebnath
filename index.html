<script>
// সার্চ সাজেশন লজিক
const searchInputBox = document.getElementById("search");
const suggestionContainer = document.getElementById("search-suggestions");

searchInputBox.addEventListener("input", function() {
  const query = this.value.toLowerCase().trim();
  if (query.length < 1) {
    suggestionContainer.style.display = "none";
    return;
  }

  const matches = videosData.filter(v => 
    v.title.toLowerCase().includes(query) || 
    v.keywords.toLowerCase().includes(query)
  ).slice(0, 6);

  if (matches.length > 0) {
    suggestionContainer.innerHTML = matches.map(m => `
      <div class="suggestion-item" onclick="applySuggestion('${m.title.replace(/'/g, "\\'")}')">
        ${m.title}
      </div>
    `).join('');
    suggestionContainer.style.display = "block";
  } else {
    suggestionContainer.style.display = "none";
  }
});

function applySuggestion(text) {
  searchInputBox.value = text;
  suggestionContainer.style.display = "none";
  handleSearch(null, false); 
}

document.addEventListener("click", function(e) {
  if (e.target !== searchInputBox) {
    suggestionContainer.style.display = "none";
  }
});
</script>

function smartNormalize(text) {
  if(!text) return "";
  let s = String(text).toLowerCase();
  s = s.replace(/</g, "&lt;").replace(/>/g, "&gt;");
  
  // ⭐ এই ম্যাপটি এখন উন্নত মাল্টি-ল্যাঙ্গুয়েজ সাপোর্টের জন্য ফিক্সড
  phoneticMap.forEach(m=>{ s = s.replace(m.from, m.to); });
  
  const fix = {"pasword":"password", "paswrd":"password", "gogle":"google", "fcebook":"facebook", "yutube":"youtube", "vidio":"video", "uplaod":"upload"};
  for(let bad in fix){ s = s.replace(new RegExp(bad,"g"), fix[bad]); }
  // non-alphanumeric cleanup
  s = s.replace(/[ -⁯⸀-⹿!"#$%&'()*+,-./:;<=>?@[\\]^_`{|}~।٬،।]/g, " ");
  s = s.replace(/\s+/g," ").trim();
  return s;
}

const normalizedVideosData = videosData.map(v => ({
    ...v,
    keywords_normalized: smartNormalize(v.title + " " + v.desc + " " + v.keywords)
}));

const fuse = new Fuse(normalizedVideosData, {
  includeScore: true,
  threshold: 0.38,
  keys: [
    { name: "title", weight: 0.55 },
    { name: "keywords_normalized", weight: 0.35 },
    { name: "desc", weight: 0.10 }
  ]
});

/* ============== highlight helper (unchanged) ============== */
function escapeRegExp(string) {
  return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}
function highlightMatch(text, query) {
  if(!query || !text) return text || "";
  // split query words, highlight each
  const parts = query.trim().split(/\s+/).filter(Boolean).map(q => escapeRegExp(q));
  if(parts.length === 0) return text;
  const re = new RegExp("(" + parts.join("|") + ")", "gi");
  return String(text).replace(re, '<span class="match">$1</span>');
}

/* ============== search logic: AIsearch returns results (unchanged) ============== */
function AIsearch(query){
  let q = smartNormalize(query);
  if(!q || q.trim().length === 0){
    return videosData;
  }
  const resultsByNorm = fuse.search(q);
  const resultsByQuery = fuse.search(query);
  let uniqueResultsMap = new Map();
  resultsByNorm.forEach(r => {
      if(!uniqueResultsMap.has(r.item.youtubeId) || r.score < uniqueResultsMap.get(r.item.youtubeId).score) { 
          uniqueResultsMap.set(r.item.youtubeId, r);
      }
  });
  resultsByQuery.forEach(r => {
      if(!uniqueResultsMap.has(r.item.youtubeId) || r.score < uniqueResultsMap.get(r.item.youtubeId).score) { 
          uniqueResultsMap.set(r.item.youtubeId, r);
      }
  });
  const finalResults = Array.from(uniqueResultsMap.values())
      .sort((a, b) => a.score - b.score)
      .map(r => r.item);
  // If no results, still try fuzzy includes (very small matches) — include any whose normalized keywords include query tokens
  if(finalResults.length === 0) {
    const tokens = q.split(" ").filter(Boolean);
    normalizedVideosData.forEach(v => {
      for(const t of tokens) {
        if(v.keywords_normalized.includes(t) || smartNormalize(v.title).includes(t) || smartNormalize(v.desc).includes(t)) {
          if(!finalResults.includes(v)) finalResults.push(v);
          break;
        }
      }
    });
  }
  return finalResults;
}

/* load iframe (autoplay) - (unchanged) */
function loadIframe(placeholderEl, youtubeId) {
  if(!youtubeId) return;
    // prevent double insertion
    if(placeholderEl.tagName && placeholderEl.tagName.toLowerCase() === 'iframe') return;
    const iframe = document.createElement('iframe');
    iframe.src = `https://www.youtube.com/embed/${youtubeId}?autoplay=1&vq=hd2160&rel=0&modestbranding=1&playsinline=1`;
    iframe.className = 'video-frame';
    iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
    iframe.allowFullscreen = true;
    placeholderEl.parentNode.replaceChild(iframe, placeholderEl);
}

/* IntersectionObserver for animation - (unchanged) */
const observer = new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(e.isIntersecting) e.target.classList.add('visible');
  });
},{ threshold:0.2 });

function saveSearchHistory(q){
  if(!q) return;
  const queryText = q.trim();
  if(queryText.length === 0) return;

  // 1. নতুন সার্চ আইটেমের জন্য সময় তৈরি করুন (যা history.html ব্যবহার করে)
  const now = new Date();
  const timeString = now.toLocaleDateString('en-US', {
    day: 'numeric',
    month: 'short',
    year: 'numeric',
    hour: '2-digit',
    minute: '2-digit'
  });

  // 2. নতুন অবজেক্ট তৈরি করুন
  const newSearchItem = {
    query: queryText, // <-- এখন query প্রপার্টি ঠিকভাবে সেভ হবে
    time: timeString  // <-- এখন time প্রপার্টি সেভ হবে
  };

  // 3. হিস্টোরি লোড করুন, ডুপ্লিকেট সরান, এবং নতুন আইটেম যোগ করুন
  let history = JSON.parse(localStorage.getItem("searchHistory")) || [];
  
  // একই query টেক্সট-এর ডুপ্লিকেট অবজেক্ট সরাতে হবে 
  history = history.filter(item => item.query !== queryText); 

  // নতুন আইটেমটি অ্যারের প্রথমে যুক্ত করুন
  history.unshift(newSearchItem);

  // 4. লোকাল স্টোরেজে সেভ করুন
  localStorage.setItem("searchHistory", JSON.stringify(history));
}

function shareVideo(videoId, title){
    const url = location.origin + location.pathname + "?v=" + videoId;

    if (navigator.share) {
        navigator.share({
            title: title,
            text: " Watch this video.👇",
            url: url
        });
    } else {
        navigator.clipboard.writeText(url);
        alert("Link copied:\n" + url);
    }
}







function playVideo(videoId){
  const iframe = document.createElement("iframe");
  iframe.src =`https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0`;
  iframe.allow =
    "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture";
  iframe.allowFullscreen = true;

  iframe.style.position = "fixed";
  iframe.style.top = 0;
  iframe.style.left = 0;
  iframe.style.width = "100vw";
  iframe.style.height = "100vh";
  iframe.style.zIndex = 99999;
  iframe.style.background = "#000";

  iframe.onclick = () => iframe.remove();
  document.body.appendChild(iframe);
}

<script>
function rotateVideo(){
  const iframe = document.querySelector(".video-overlay iframe");
  if(!iframe) return;

  // Fullscreen trigger (THIS causes auto-rotate)
  if (iframe.requestFullscreen) {
    iframe.requestFullscreen();
  } else if (iframe.webkitRequestFullscreen) {
    iframe.webkitRequestFullscreen();
  } else if (iframe.mozRequestFullScreen) {
    iframe.mozRequestFullScreen();
  } else if (iframe.msRequestFullscreen) {
    iframe.msRequestFullscreen();
  }
}
</script>
<script>
/* ===== Animate ALL videos (scroll + load) ===== */
const videoObserver = new IntersectionObserver(
  (entries) => {
    entries.forEach((entry, index) => {
      if (entry.isIntersecting) {
        setTimeout(() => {
          entry.target.classList.add("show");
        }, index * 120); // 🔥 stagger delay
        videoObserver.unobserve(entry.target);
      }
    });
  },
  {
    threshold: 0.15
  }
);

/* observe all video posts */
function observeVideos(){
  document.querySelectorAll(".video-post").forEach(card => {
    card.classList.remove("show"); // reset
    videoObserver.observe(card);
  });
}

/* first load */
window.addEventListener("load", () => {
  setTimeout(observeVideos, 200);
});

/* re-observe after search / re-render */
const oldRenderAll = renderAll;
renderAll = function(list, query){
  oldRenderAll(list, query);
  setTimeout(observeVideos, 100);
};



// এই কোডটি আপনার index.html ফাইলের <script> ট্যাগে যুক্ত করুন

function getQueryParam(name) {
  // URL থেকে ক্যোয়ারি প্যারামিটার (যেমন ?v=...) বের করার ফাংশন
  const urlParams = new URLSearchParams(window.location.search);
  return urlParams.get(name);
}

// ⭐ নতুন কোড ব্লক: সার্চ হিস্টোরি এবং ওয়াচ হিস্টোরি উভয়ই হ্যান্ডেল করবে ⭐
// ----------------------------------------------------------
const urlSearchQuery = getQueryParam('search'); // URL থেকে 'search' প্যারামিটারটি নিন

if (urlSearchQuery) {
  // 1. যদি সার্চ হিস্টোরি থেকে আসা কোনো কোয়েরি পাওয়া যায়
  const searchInput = document.getElementById('search');
  
  // ইনপুট বক্সে কোয়েরিটি সেট করুন
  if (searchInput) {
    searchInput.value = urlSearchQuery;
  }

  // 2. স্বয়ংক্রিয়ভাবে সার্চ ফাংশনটি কল করুন
  setTimeout(() => {
    handleSearch(null, false); 
  }, 100); 

  // 3. URL পরিষ্কার রাখার জন্য ?search= প্যারামিটারটি মুছে দিন (ঐচ্ছিক)
  if (window.history.replaceState) {
    const cleanUrl = window.location.origin + window.location.pathname;
    window.history.replaceState({path:cleanUrl},'',cleanUrl);
  }
}

// ⭐ ওয়াচ হিস্টোরি (ভিডিও আইডি: ?v=) হ্যান্ডেল করার জন্য সংশোধিত লজিক ⭐

else {

      openVideo(videoId, videoData.title);

      // 3. URL পরিষ্কার রাখা (ঐচ্ছিক)
      if (window.history.replaceState) {

function updateVideoSchema(v) {
  let schemaId = "dynamic-video-schema";
  let oldSchema = document.getElementById(schemaId);
  if (oldSchema) oldSchema.remove();

  const schema = {
    "@context": "https://schema.org",
    "@type": "VideoObject",
    "name": v.title,
            // আপনার বর্তমান স্কিমা কোডের ভেতরে শুধু এই লাইনটি যোগ করুন
"keywords": v.keywords, 
    "description": v.desc,
    "thumbnailUrl": `https://img.youtube.com/vi/${v.youtubeId}/maxresdefault.jpg`,
    "uploadDate": "2024-01-01T08:00:00+08:00", // আপনার পছন্দমতো ডেট
    "embedUrl": `https://www.youtube.com/embed/${v.youtubeId}`
  };

  const script = document.createElement('script');
  script.id = schemaId;
  script.type = 'application/ld+json';
  script.text = JSON.stringify(schema);
  document.head.appendChild(script);
}
